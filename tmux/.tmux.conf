# .tmux.conf  --  lightweight, keyboard-first, WSL2 aware

# --- prefix -------------------------------------------------------------------
# Ctrl-a is easier to reach than the default Ctrl-b.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- general ------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -sg escape-time 10                       # responsive ESC in Neovim
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g display-time 2000

# --- reload -------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# --- splits (keep current path) ----------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- pane navigation (vim-style) ---------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- copy mode (vi keys) -----------------------------------------------------
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# WSL2: route tmux copies to the Windows clipboard via win32yank when present.
if-shell "command -v win32yank.exe" {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"
}

# --- status bar (minimal) ----------------------------------------------------
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=blue,bold] #S #[default]"
set -g status-left-length 30
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M "
set -g window-status-current-format "#[fg=black,bg=blue,bold] #I:#W "
set -g window-status-format " #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
