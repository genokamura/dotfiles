# starship.toml  --  fast, minimal, single-line prompt with a trailing char
# https://starship.rs/config/

add_newline = true
command_timeout = 800

format = """
$directory\
$git_branch\
$git_status\
$git_state\
${custom.wsl}\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " "
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "[ $duration]($style) "

[python]
symbol = " "
format = '[$symbol($version )(\($virtualenv\) )]($style)'
style = "yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "green"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"

# Show a marker when inside WSL.
[custom.wsl]
command = "echo wsl"
when = "grep -qiE '(microsoft|wsl)' /proc/version"
symbol = " "
format = "[$symbol]($style)"
style = "bold blue"
